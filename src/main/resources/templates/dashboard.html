<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📊 할 일 통계 대시보드</h1>
        <a th:href="@{/tasks}">
            <button type="button">← 목록으로</button>
        </a>
    </div>

    <p>총 할 일 수: <strong th:text="${total}">0</strong></p>
    <p>완료된 할 일: <strong th:text="${completed}">0</strong></p>
    <p>완료율: <strong th:text="${rate}">0</strong>%</p>

    <div style="margin-top:2rem;">
        <canvas id="monthlyChart" width="400" height="200"></canvas>
    </div>
</div>

<script th:inline="javascript">

    const monthly = [[${monthly}]];

    const labels = new Array();
    const totalData  = new Array();
    const completedData = new Array();

    monthly.forEach(el => {
       labels.push(el.month);
       totalData.push(el.count);
       completedData.push(el.completed);
       completedData.push();
    });

   const ctx = document.getElementById('monthlyChart');
   new Chart(ctx, {
       type: 'bar',
       data: {
           labels: labels,
           datasets: [{
               label: '총 할일 수',
               data: totalData,
               backgroundColor: '#2e7dff'
           },
           {
               label: '완료된 할 일',
               data: completedData,
               backgroundColor: '#81c784'
           }]
       },
       options: {
           scales: {
               y: { beginAtZero: true }
           }
       }
   });
</script>
</body>
</html>
